worker_processes auto;
events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 5G;

    # GZIP Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        # Basic Security & WASM Isolation Headers (MANDATORY FOR FFMPEG WASM)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # 1. Frontend: Serve Static Angular Build
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            
            # HTML5 routing fallback
            try_files $uri $uri/ /index.html;

            # Cache statics heavily
            location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }

        # 2. Backend API Proxy: Route to Ghost Server Node.js
        location /api/ {
            proxy_pass http://ghost-backend:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Streaming limits for huge uploads
            proxy_request_buffering off;
            proxy_read_timeout 3600;
        }
    }
}
