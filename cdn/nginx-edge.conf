worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Hide NGINX version
    server_tokens off;

    # ==========================================
    # Compression (Gzip)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ==========================================
    # Caching Engine Configuration
    # ==========================================
    # Defines a 10GB RAM/Disk cache zone named 'heavy_cache'
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=heavy_cache:50m max_size=20g inactive=24h use_temp_path=off;

    # Limit request rates to prevent abuse
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ==========================================
        # Security & CORS Headers
        # ==========================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Required for SharedArrayBuffer Web Workers
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # Injects a header so we can see if the file Hit the Cache or Missed (hit the backend)
        add_header X-Cache-Status $upstream_cache_status always;

        # ==========================================
        # Proxy to Ghost Server
        # ==========================================
        location / {
            proxy_pass http://ghost-backend:3000;
            
            # Forward real client IPs
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Aggressive Edge Caching for Media Files
            proxy_cache heavy_cache;
            
            # Cache 200 (OK) and 302 (Redirect) responses for 24 hours
            proxy_cache_valid 200 302 24h;
            # Cache 404 (Not Found) for 1 minute to prevent DDoS on missing files
            proxy_cache_valid 404 1m;

            # Stale Content Delivery: Serve expired/caching files if the Ghost Server crashes
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;

            # Force browsers to wait if multiple clients request the same uncached file simultaneously
            proxy_cache_lock on;
            
            # Bypass cache for uploads (POST requests)
            proxy_cache_bypass $http_pragma $cookie_nocache;
            proxy_no_cache $cookie_nocache $arg_nocache $arg_comment;
            proxy_no_cache $http_pragma $http_authorization;

            # Apply Rate Limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Handling massive file streaming
        client_max_body_size 5G;
    }
}
