version: '3.8'

services:
  # 1. The Omni Relational Core (PostgreSQL)
  ghost-postgres:
    image: postgres:15-alpine
    container_name: ghost_postgres
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omnipassword
      POSTGRES_DB: omnidb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    # No ports exposed to internet. Only accessible within docker network.

  # 2. The Real Backend API (Ghost Server)
  ghost-backend:
    build: 
      context: ./ghost-server
      dockerfile: Dockerfile
    container_name: ghost_backend
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://omni:omnipassword@ghost-postgres:5432/omnidb?schema=public
    volumes:
      - ./ghost-server/uploads:/usr/src/app/uploads
      - ./ghost-server/prisma:/usr/src/app/prisma
    depends_on:
      - ghost-postgres
    restart: always

  # 3. Omni Media Worker (Isolated FFmpeg Node)
  omni-worker:
    build:
      context: ./omni-worker
      dockerfile: Dockerfile
    container_name: omni_worker
    environment:
      - GHOST_SERVER_URL=http://ghost-backend:3000
    volumes:
      - ./ghost-server/uploads:/usr/src/app/uploads
    depends_on:
      - ghost-backend
    restart: always

  # 4. Production Web Router (NGINX)
  omni-nginx:
    image: nginx:alpine
    container_name: omni_nginx
    ports:
      - "80:80"    # the only port exposed!
      - "443:443"  # for future SSL
    volumes:
      - ./cdn/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./dist/app/browser:/usr/share/nginx/html:ro  # Serves compiled Angular
      - nginx-cache:/var/cache/nginx
    depends_on:
      - ghost-backend
    restart: always

volumes:
  nginx-cache:
  postgres-data:
